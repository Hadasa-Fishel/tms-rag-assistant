                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#ADD8E6", "id": "classify_query", "label": "classify_query", "shape": "box", "title": null}, {"color": "#90EE90", "id": "InputValidatedEvent", "label": "InputValidatedEvent", "shape": "ellipse", "title": null}, {"color": "#90EE90", "id": "RouteDecisionEvent", "label": "RouteDecisionEvent", "shape": "ellipse", "title": null}, {"color": "#ADD8E6", "id": "expand_query", "label": "expand_query", "shape": "box", "title": null}, {"color": "#90EE90", "id": "QueryReadyEvent", "label": "QueryReadyEvent", "shape": "ellipse", "title": null}, {"color": "#ADD8E6", "id": "finalize_response", "label": "finalize_response", "shape": "box", "title": null}, {"color": "#90EE90", "id": "WorkflowCompletedEvent", "label": "WorkflowCompletedEvent", "shape": "ellipse", "title": null}, {"color": "#FFA07A", "id": "StopEvent", "label": "StopEvent", "shape": "ellipse", "title": null}, {"color": "#ADD8E6", "id": "generate_response", "label": "generate_response", "shape": "box", "title": null}, {"color": "#90EE90", "id": "RetrievalCompletedEvent", "label": "RetrievalCompletedEvent", "shape": "ellipse", "title": null}, {"color": "#ADD8E6", "id": "handle_error", "label": "handle_error", "shape": "box", "title": null}, {"color": "#90EE90", "id": "WorkflowErrorEvent", "label": "WorkflowErrorEvent", "shape": "ellipse", "title": null}, {"color": "#ADD8E6", "id": "handle_refinement", "label": "handle_refinement", "shape": "box", "title": null}, {"color": "#90EE90", "id": "RefinementRequiredEvent", "label": "RefinementRequiredEvent", "shape": "ellipse", "title": null}, {"color": "#ADD8E6", "id": "retrieve_documents", "label": "retrieve_documents", "shape": "box", "title": null}, {"color": "#ADD8E6", "id": "validate_input", "label": "validate_input", "shape": "box", "title": null}, {"color": "#E27AFF", "id": "StartEvent", "label": "StartEvent", "shape": "ellipse", "title": null}]);
                  edges = new vis.DataSet([{"arrows": "to", "from": "classify_query", "to": "RouteDecisionEvent"}, {"arrows": "to", "from": "InputValidatedEvent", "to": "classify_query"}, {"arrows": "to", "from": "expand_query", "to": "QueryReadyEvent"}, {"arrows": "to", "from": "RouteDecisionEvent", "to": "expand_query"}, {"arrows": "to", "from": "finalize_response", "to": "StopEvent"}, {"arrows": "to", "from": "WorkflowCompletedEvent", "to": "finalize_response"}, {"arrows": "to", "from": "generate_response", "to": "WorkflowCompletedEvent"}, {"arrows": "to", "from": "RetrievalCompletedEvent", "to": "generate_response"}, {"arrows": "to", "from": "handle_error", "to": "StopEvent"}, {"arrows": "to", "from": "WorkflowErrorEvent", "to": "handle_error"}, {"arrows": "to", "from": "handle_refinement", "to": "RetrievalCompletedEvent"}, {"arrows": "to", "from": "handle_refinement", "to": "WorkflowErrorEvent"}, {"arrows": "to", "from": "handle_refinement", "to": "StopEvent"}, {"arrows": "to", "from": "RefinementRequiredEvent", "to": "handle_refinement"}, {"arrows": "to", "from": "retrieve_documents", "to": "RetrievalCompletedEvent"}, {"arrows": "to", "from": "retrieve_documents", "to": "RefinementRequiredEvent"}, {"arrows": "to", "from": "retrieve_documents", "to": "WorkflowErrorEvent"}, {"arrows": "to", "from": "QueryReadyEvent", "to": "retrieve_documents"}, {"arrows": "to", "from": "validate_input", "to": "InputValidatedEvent"}, {"arrows": "to", "from": "validate_input", "to": "WorkflowErrorEvent"}, {"arrows": "to", "from": "StartEvent", "to": "validate_input"}]);

                  var options = {
    "configure": {

};

                  return network;
